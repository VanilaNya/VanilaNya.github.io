<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <script src="/script2.js"></script><!--引入脚本-->
    <link rel="stylesheet" type="text/css" href="/styles.css"> <!-- 引入样式表 -->
    <link rel="icon" type="image/jpg" href="/data/favicon.jpg">
    <style>
        body {
        background-image: url('/data/gamedevelopment.jpg');
        background-size: cover; /* 背景图片自动调整大小以覆盖整个页面 */
        background-repeat: no-repeat; /* 防止背景图片重复 */
        background-position: center; /* 背景图片居中显示 */
        }
    </style>
</head>
<header>
    <div data-navbar-id="main" class="navbar-placeholder"></div>
</header>
<body>
<div class="inbody">

    <h2>QQ邮箱验证码登录</h2>
        
        <!-- 输入邮箱 -->
        <div class="input-group">
            <label for="qqEmail">请输入QQ邮箱：</label>
            <input type="text" id="qqEmail" placeholder="例如：123456@qq.com" required>
        </div>

        <!-- 生成验证码按钮 -->
        <button class="btn" id="generateBtn">生成并发送验证码</button>

        <!-- 验证码显示区域 -->
        <div class="code-display" id="codeDisplay"></div>

        <!-- 验证码输入 -->
        <div class="input-group">
            <label for="verifyCode">请输入验证码：</label>
            <input type="text" id="verifyCode" placeholder="输入收到的验证码" inputmode="numeric" required>
        </div>

        <!-- 验证码倒计时提示 -->
        <div class="countdown-group" id="countdownGroup" style="display: none;">
            <p>验证码剩余有效时间：<span id="countdownTimer">10:00</span></p>
        </div>

        <!-- 提交按钮 -->
        <button class="btn" id="submitBtn" disabled>登录</button>

        <!-- 结果提示 -->
        <div class="result" id="result"></div>
    </div>

    <script>
        // 全局变量
        let generatedCode = '';       // 存储生成的验证码
        let codeExpireTime = 0;       // 存储验证码失效时间戳（毫秒）

        // 生成10位随机数字验证码（带失效时间记录）
        function generateCode() {
            const now = Date.now();               // 当前时间戳
            const expireTime = now + 600000;      // 10分钟后失效（600000毫秒）
            generatedCode = Math.floor(1000000000 + Math.random() * 9000000000).toString();
            codeExpireTime = expireTime;          // 更新失效时间戳
            return generatedCode;
        }

        // 发送邮件（整合API）
        async function sendEmail(email, code) {
            // 计算失效时间并格式化为本地时间字符串
            const expireDate = new Date(codeExpireTime);
            const expireTimeStr = expireDate.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            }); // 示例输出：2024/5/20 15:30:45

            try {
                const response = await fetch('https://luckycola.com.cn/tools/customMail', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ColaKey: 'nKaUIt52LY7W8C1754019584677hgWDk95qPx',
                        tomail: email,
                        fromTitle: 'QQ邮箱验证码登录',
                        subject: '您的登录验证码',
                        smtpCode: 'rxvvnyrzoouteagg',
                        smtpEmail: 'nreply_vn_website@qq.com',
                        smtpCodeType: 'qq',
                        isTextContent: false,
                        content: `
                            <p>您的验证码是：<strong>${code}</strong>（10分钟内有效）</p>
                            <p>验证码将在 <strong>${expireTimeStr}</strong> 后失效</p>
                            <p>如果不是您操作，请忽略此邮件，如果分享验证码给他人会导致其他人登录您的账号。</p>
                        `
                    })
                });

                if (!response.ok) throw new Error(`HTTP错误，状态码：${response.status}`);
                return await response.json();
            } catch (error) {
                throw new Error(`请求失败：${error.message}`);
            }
        }

        // 处理生成验证码逻辑
        async function handleGenerateCode() {
            const email = document.getElementById('qqEmail').value.trim();
            
            // 验证邮箱格式（支持字母+数字）
            if (!/^[1-9]\d{4,}@qq\.com$/.test(email)) {
                showError('请输入有效的QQ邮箱（如 123456@qq.com 或 abc123@qq.com）');
                return;
            }

            // 生成验证码并记录时间
            generatedCode = generateCode();
            document.getElementById('codeDisplay').textContent = `验证码：${generatedCode}`;
            document.getElementById('codeDisplay').style.display = 'block'; // 显示验证码区域

            try {
                // 发送邮件
                await sendEmail(email, generatedCode);
                showSuccess('验证码已发送，请查收邮箱');
                enableSubmitButton();
                startCountdown(); // 启动倒计时
            } catch (error) {
                showError(`发送失败：${error.message}`);
            }
        }

        // 处理登录验证（带时效性检查）
        function handleLogin() {
            const inputCode = document.getElementById('verifyCode').value.trim();
            const now = Date.now();

            // 检查验证码是否已过期
            if (now > codeExpireTime) {
                showError('验证码已过期，请重新获取');
                return;
            }

            // 检查验证码是否正确
            if (inputCode === generatedCode) {
                
                showSuccess('登录成功！');
                // 这里可以添加实际登录逻辑（如跳转页面）
                // window.location.href = '登录成功页面.html';
            } else {
                showError('验证码错误，请重新输入');
            }
        }

        // 显示成功提示
        function showSuccess(message) {
            function setPermanentCookie(name, value, maxAgeSeconds = 3153600000) {
    // 编码值（避免特殊字符）
    const encodedValue = encodeURIComponent(value);
    
    // 构建Cookie字符串
    let cookieStr = `${name}=${encodedValue}; path=/`; // path=/ 确保全站有效
    
    // 设置超长期有效期（max-age优先于expires）
    cookieStr += `; max-age=${maxAgeSeconds}`;
    
    // 可选：如果是HTTPS网站，添加Secure属性（防止中间人攻击）
    if (window.location.protocol === 'https:') {
        cookieStr += '; Secure';
    }
    
    // 可选：设置SameSite（根据需求调整，Lax为默认兼容模式）
    cookieStr += '; SameSite=Lax';
    
    document.cookie = cookieStr;
}
            // 获取用户输入的邮箱（从输入框读取）
        const userEmail = document.getElementById('qqEmail').value.trim();
        
        // 设置超长期有效的user Cookie（100年有效期）
        setPermanentCookie('user', userEmail);
        
            const resultEl = document.getElementById('result');
            resultEl.className = 'result success';
            resultEl.textContent = message;
            resultEl.style.display = 'block';
        }

        // 显示错误提示
        function showError(message) {
            const resultEl = document.getElementById('result');
            resultEl.className = 'result error';
            resultEl.textContent = message;
            resultEl.style.display = 'block';
        }

        // 启用提交按钮
        function enableSubmitButton() {
            document.getElementById('submitBtn').disabled = false;
        }

        // 启动验证码倒计时
        function startCountdown() {
            const countdownGroup = document.getElementById('countdownGroup');
            const countdownTimer = document.getElementById('countdownTimer');
            countdownGroup.style.display = 'block';

            let remainingSeconds = 600; // 10分钟（秒）
            countdownTimer.textContent = formatTime(remainingSeconds);

            const timer = setInterval(() => {
                remainingSeconds--;
                countdownTimer.textContent = formatTime(remainingSeconds);

                if (remainingSeconds <= 0) {
                    clearInterval(timer);
                    countdownTimer.textContent = '已过期';
                    document.getElementById('submitBtn').disabled = true;
                }
            }, 1000);
        }

        // 格式化时间为 MM:SS
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        // 事件绑定
        document.getElementById('generateBtn').addEventListener('click', handleGenerateCode);
        document.getElementById('submitBtn').addEventListener('click', handleLogin);

        // 初始化状态
        disableSubmitButton();
        document.getElementById('result').style.display = 'none';
    </script>
    <!--看什么源代码呢，很好看吗-->
</div>
<div id="muban2"></div>
</body>
<footer>
    <div id="muban"></div>
</footer>
<script src="script.js"></script>
<link rel="stylesheet" type="text/css" href="/styles2.css"> <!-- 引入样式表 -->
</html>
