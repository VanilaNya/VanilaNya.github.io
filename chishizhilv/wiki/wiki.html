<script>
// 仅在加载时获取一次仓库信息（不自动刷新）
document.addEventListener('DOMContentLoaded', function () {
  const endpoint = 'https://api.github.com/repos/VanillaNya5/Journey_of_the_Shit';
  const container = document.getElementById('repo-info');
  if(!container) return;
  container.textContent = '正在加载仓库信息…';

  (async function(){
    try{
      const res = await fetch(endpoint, { headers: { 'Accept': 'application/vnd.github+json' } });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const j = await res.json();

      // 构建内容（使用 DOM 方法以避免 HTML 注入）
      container.textContent = '';
      const top = document.createElement('div');
      top.style.display = 'flex';
      top.style.gap = '8px';
      top.style.alignItems = 'center';
      top.style.flexWrap = 'wrap';

      const link = document.createElement('a');
      link.href = j.html_url || '#';
      link.target = '_blank';
      link.rel = 'noopener';
      link.textContent = j.full_name || 'repository';
      link.style.fontWeight = '700';
      link.style.color = 'inherit';
      link.style.textDecoration = 'underline';
      top.appendChild(link);

      if(j.language){
        const lang = document.createElement('span');
        lang.style.color = 'var(--muted,#666)';
        lang.style.fontSize = '0.9em';
        lang.textContent = j.language;
        top.appendChild(lang);
      }
      container.appendChild(top);

      if(j.description){
        const desc = document.createElement('div');
        desc.style.marginTop = '6px';
        desc.style.color = 'var(--muted,#444)';
        desc.textContent = j.description;
        container.appendChild(desc);
      }

      const ul = document.createElement('ul');
      ul.style.margin = '8px 0 4px 18px';
      ul.style.padding = '0';
      ul.style.color = 'inherit';
      const li1 = document.createElement('li');
      li1.style.listStyle = 'disc';
      li1.textContent = `Stars: ${j.stargazers_count}  ·  Watchers: ${j.watchers_count}  ·  Forks: ${j.forks_count}`;
      ul.appendChild(li1);
      const li2 = document.createElement('li');
      li2.style.listStyle = 'disc';
      li2.textContent = `Open issues: ${j.open_issues_count}  ·  Size: ${j.size} KB`;
      ul.appendChild(li2);
      const li3 = document.createElement('li');
      li3.style.listStyle = 'disc';
      li3.textContent = `Default branch: ${j.default_branch || ''}`;
      ul.appendChild(li3);
      container.appendChild(ul);

      const foot = document.createElement('div');
      foot.style.fontSize = '0.85em';
      foot.style.color = 'var(--muted,#555)';
      foot.style.marginTop = '6px';
      // optional homepage link
      if(j.homepage){
        const hp = document.createElement('a');
        hp.href = j.homepage;
        hp.target = '_blank';
        hp.rel = 'noopener';
        hp.textContent = '官网';
        foot.appendChild(hp);
        foot.appendChild(document.createTextNode(' '));
      }
      const view = document.createElement('a');
      view.href = j.html_url || '#';
      view.target = '_blank';
      view.rel = 'noopener';
      view.textContent = '查看仓库';
      foot.appendChild(view);
      foot.appendChild(document.createTextNode(' · 最后更新（UTC）: ' + (j.updated_at ? new Date(j.updated_at).toUTCString() : '')));
      foot.appendChild(document.createTextNode(' · 最近提交（UTC）: ' + (j.pushed_at ? new Date(j.pushed_at).toUTCString() : '')));

      container.appendChild(foot);

    }catch(err){
      console.error('获取仓库信息失败', err);
      container.textContent = '无法获取仓库信息（可能受限于 GitHub API 限流或网络）';
    }
  })();
});
</script>
